id: buransh
title: 🌺 Buransh
description: A customizable Astro 7 theme with automated JSON-LD SEO schema generation, a Supabase-backed engagement layer, and PWA offline support.
longDesc: >-
  A production-ready Astro starter built as a pnpm/Turborepo monorepo.
  A dedicated schema package covers 23 content types with full JSON-LD
  generation and Zod-validated frontmatter, deployable to either Cloudflare
  Workers or Vercel via a single config switch. A Supabase-backed adapter
  layer powers claps, ratings, threaded comments, bookmarks, and
  Kindle-style highlights, with rule-based content-policy checks already
  live and an AI-assisted auditing layer and MCP server scaffolded for
  what's next.
tech: Astro · Tailwind · Supabase
